<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Lite</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --text-0: #0f172a;
      --text-1: #475569;
      --text-2: #94a3b8;
      --accent: #0d9488;
      --accent-hover: #0b8074;
      --accent-soft: #ccfbf1;
      --accent-softer: #f0fdfa;
      --green: #16a34a;
      --blue: #2563eb;
      --red: #dc2626;
      --radius: 8px;
    }

    html,
    body {
      width: 300px;
      background: var(--bg);
      color: var(--text-0);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
    }

    .wrap {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 7px;
      overflow: hidden;
    }

    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .conn {
      margin-left: auto;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .conn:hover { background: var(--border); }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-2);
      flex-shrink: 0;
    }

    .conn.on {
      color: var(--accent);
      background: var(--accent-soft);
    }
    .conn.on .dot { background: var(--accent); }

    .conn.invalid {
      color: var(--red);
      background: rgba(220, 38, 38, 0.1);
    }
    .conn.invalid .dot { background: var(--red); }

    /* 主按钮 */
    .save-btn {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s ease;
    }

    .save-btn:hover:not(:disabled) { opacity: 0.88; }
    .save-btn:disabled { opacity: 0.55; cursor: default; }
    .save-btn svg { width: 15px; height: 15px; }

    .spin { animation: spin 0.7s linear infinite; display: inline-flex; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 状态提示 */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      height: 20px;
      margin-top: -4px;
      overflow: hidden;
    }

    .status svg { width: 14px; height: 14px; flex-shrink: 0; }
    .status.empty { opacity: 0; }
    .status.verifying { color: var(--text-1); }
    .status.success { color: var(--green); }
    .status.exists { color: var(--blue); }
    .status.error,
    .status.authError,
    .status.noToken { color: var(--red); }

    /* 分隔区块 */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .field.no-divider {
      padding-top: 0;
      border-top: none;
    }

    /* 同步开关行 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-text .t { font-size: 12.5px; font-weight: 500; color: var(--text-0); }
    .toggle-text .d { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    .switch {
      position: relative;
      flex-shrink: 0;
      width: 34px;
      height: 20px;
      border: none;
      border-radius: 999px;
      background: var(--border);
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .switch.on { background: var(--accent); }

    .switch .knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      transition: transform 0.18s ease;
    }

    .switch.on .knob { transform: translateX(14px); }

    /* 待重试提示 */
    .queue-note {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-2);
    }
    .queue-note svg { width: 12px; height: 12px; }

    /* 底部设置入口 */
    .settings-entry {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .settings-entry:hover { color: var(--text-0); }
    .settings-entry svg { width: 15px; height: 15px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
